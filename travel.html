    <section id="world-map-container">
        <div id="world-map"></div>
    </section>
	
	<script>
		$(function(){
            var col = '#FF0000';
            var countriestohighlight = ['AT','IN','HK','TH','AE','VN','SG','BE','GB','IT','MY','FR','NL','CH','DE'];

            const valueMap = new Map();
            
            for(country of countriestohighlight){
                valueMap.set(country, col);
            }
            const obj = Object.fromEntries(valueMap);
            console.log(obj);
		    $('#world-map').vectorMap({
                map: 'world_mill',
                backgroundColor: '#383f47',
                series: {
                    regions: [{
                        values: obj
                    }]
                }
            });
		});

        
	</script>
